<!DOCTYPE html>
<html lang="fr" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - Les Ailes de Sénart</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: #0F172A; }
        body { display: flex; align-items: center; justify-content: center; }
        .card { background: white; width: 450px; max-width: 90%; border-radius: 20px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); text-align: center; }
        .logo { height: 70px; margin-bottom: 20px; }
        h1 { font-weight: 800; font-size: 1.5rem; margin-bottom: 30px; color: #0F172A; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: #94A3B8; margin-bottom: 8px; }
        input { width: 100%; box-sizing: border-box; background: #F8FAFC; border: 2px solid #E2E8F0; padding: 16px; border-radius: 12px; font-size: 1rem; }
        button { width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; background: #3B82F6; color: white; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .err { background: #FEF2F2; color: #B91C1C; }
        .suc { background: #F0FDF4; color: #15803D; }
    </style>
</head>
<body>
    <div class="card">
        <img src="resources/logo_05519.png" alt="ADS" class="logo">
        <h1>Nouveau mot de passe</h1>
        
        <div class="group">
            <label>Nouveau mot de passe (min 6 car.)</label>
            <input type="password" id="new-pw" placeholder="••••••••">
        </div>
        
        <button id="btn-reset" onclick="updatePassword()">Mettre à jour</button>

        <div id="msg"></div>
    </div>

    <script>
        let client;
        const SU_URL = "https://hksbiafznhdjngzimypi.supabase.co";
        const SU_KEY = "sb_publishable_odIBMR0BBSPQiJrcyma9NQ_sumPmxew";

        window.onload = function() {
            client = window.supabase.createClient(SU_URL, SU_KEY);
        };

        async function updatePassword() {
            const pw = document.getElementById('new-pw').value;
            const ms = document.getElementById('msg');
            const btn = document.getElementById('btn-reset');

            if (pw.length < 6) {
                ms.style.display = 'block';
                ms.className = 'err';
                ms.innerText = "Minimum 6 caractères.";
                return;
            }

            btn.disabled = true;
            ms.style.display = 'block';
            ms.className = '';
            ms.innerText = "Mise à jour...";

            try {
                const { error } = await client.auth.updateUser({ password: pw });
                if (error) throw error;

                ms.className = "suc";
                ms.innerHTML = "<strong>Succès !</strong><br>Votre mot de passe a été modifié. Redirection...";
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);

            } catch (err) {
                ms.className = "err";
                ms.innerText = "Erreur : " + err.message;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
