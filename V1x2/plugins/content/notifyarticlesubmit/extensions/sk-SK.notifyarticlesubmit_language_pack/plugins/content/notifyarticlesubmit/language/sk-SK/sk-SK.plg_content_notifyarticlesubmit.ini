PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Vyber ktoré nastavenia zobraziť.<br /><br />Môžeš nastaviť upozornenia zvlášť pre<strong>bežných používateľov</strong> a<strong>správcov</strong>.<br /><br />Dôvod existencie dvoch skupín nastavenia je ten, že napr. môžete chcieť upozorňovať bežných používateľov na zmeny len v niektorých kategóriách článkov zatiaľ čo správcov na všetky typy zmien vo všetkých článkoch. Tieto skupiny sú viacmenej logické, ale sú tu niektoré rozdiely. Správcovia majú vyššiu prioritu ako bežní používatelia. To znamená, že ak konkrétny používateľ by mal byť upozorňovaný aj ako správca aj ako bežný používateľ, tak bude upozorňovaný iba ako správca."
