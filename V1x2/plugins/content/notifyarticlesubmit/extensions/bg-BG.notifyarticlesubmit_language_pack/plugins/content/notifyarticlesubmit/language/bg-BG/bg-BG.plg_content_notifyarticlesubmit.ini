PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Изберете какви настройки да се покажат.<br /><br />Можете да избирате уведомления за<strong>Нормални Потребители</strong> and <strong>Администратори</strong>.<br /><br />Значението на тези две групи е с други думи може да искате да уведомите нормални потребители за статии в някои категории, но администраторите да получават всички уведомения. Тези групи са само Логически групи, Но все пак има разлики.<br /><br />Администраторите имат приоритет пред нормалните потребители.това означава ,че ако потребител има уведомения за администраторски и нормални секции, то тогава ще бъде уведомен като АДМИНИСТРАТОР."
