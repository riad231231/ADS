PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Какие параметры просмотреть. <br /> <br /> Вы можете настроить уведомления отдельно для <strong>обычных пользователей</strong> и <strong>административных пользователей</strong>. <br /> <br /> Эти две группы имеются для того, чтобы была возможность, например, сообщать обычным пользователям только о статьях в некоторых категориях, но администраторов уведомлять всегда. Эти группы в являются скорре логическими, но все же есть некоторые различия в настройках.<br /><br />Административные пользователи имеют более высокий приоритет, чем обычные. Это означает, что если пользователь указан в уведомлении для обоих груп, как административный и как обычный, то пользователь будет уведомлен только в качестве администратора."
