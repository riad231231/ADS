PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Scegliere quali impostazioni mostrare.<br /><br />Puoi impostare le notifiche separatamente per <strong>Utenti normali</strong> e  <strong>Amministratori</strong>.<br /><br />Lo scopo dell'esistenza dei due gruppi e che, per esempio, vorresti notificare gli utenti normali sugli articoli di alcune categorie, ma di notificare gli amministratori su tutto. Questi gruppi sono principalmente logici ma ci sono ancora alcune differenze.<br /><br />Gli Amministratori hanno maggiore priorit&agrave; sugli utenti normali. Questo significa che, se un utente &egrave; impostato per essere notificato sia  come amministratore che come utente normali, allora verr&agrave; notificato solo come amministratore."
