PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_NOTIFY_ONLY_IF_CAN_VIEW_DESC="U kunt aangeven of berichten moeten worden gestuurd aan gebruikers die geen rechten hebben om artikelen te beoordelen. Bijvoorbeeld als de toegang tot artikelen achter een betaalmuur zit en U iedereen wilt inlichten. Of U wilt de gebruikers zonder beoordelingsbevoegdheid niet informeren over nieuwe onderwerpen."
