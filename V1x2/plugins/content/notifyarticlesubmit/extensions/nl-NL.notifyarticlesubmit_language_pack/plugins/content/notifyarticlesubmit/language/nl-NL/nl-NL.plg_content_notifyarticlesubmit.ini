PLG_CONTENT_NOTIFYARTICLESUBMIT_NOTIFY_DESC="U kunt instellen om gebruikers geen bericht te sturen bij kleine correcties. Dit is bedoeld om Spam te voorkomen. <br />\n<b>Opmerking: </b>Als het bericht niet moet worden verstuurd naar een gebruiker of naar een groep volgens de instellingen van de NotifyArticleSubmit plugin, dan geeft deze optie daartoe ook geen toestemming. U kunt de berichten alleen uitschakelen voor hen die deze berichten behoren te ontvangen."
