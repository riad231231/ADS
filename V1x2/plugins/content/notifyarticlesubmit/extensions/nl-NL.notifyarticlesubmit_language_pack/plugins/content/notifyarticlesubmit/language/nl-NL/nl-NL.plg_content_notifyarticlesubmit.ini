PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Kies welke instellingen u wilt tonen.<br /><br />U kunt de mededeling afzonderlijk instellen voor <strong>Gewone gebruikers</strong> en <strong>Admin gebruikers</strong>.<br /><br />De bedoeling van deze indeling in twee groepen is dat U bijv. de Gewone gebruikers alleen een mededeling wilt sturen over artikelen in bepaalde categorieen,terwijl de Admin gebruikers alle mededeling kunnen krijgen. Hoewel de twee groepen hiervoor zijn gemaakt, zijn er wel enkele verschillen.<br /><br />Admin gebruikers hebben nl. meer prioriteiten dan de Gewone gebruikers. Dit betekent dat als een gebruiker bij de instellingen is opgenomen als Gewone èn ook als Admin gebruiker, deze gebruiker dan alleen als Admin gebruiker een mededeling zal ontvangen."
