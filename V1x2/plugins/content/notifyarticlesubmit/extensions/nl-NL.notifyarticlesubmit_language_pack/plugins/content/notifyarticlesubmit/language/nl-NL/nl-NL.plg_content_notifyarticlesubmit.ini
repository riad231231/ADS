PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_MESSAGE_SYSTEM_DESC="Gebruik CTRL + click (PC) of COMMAND + click (Mac) om meerdere te selecteren. Deze lijst bevat alle ondersteunde berichten systemen. Als U een berichten-systeem kiest dat niet is ge&iuml;nstalleerd dan gebeurt er niets totdat dit systeem alsnog wordt ge&iuml;nstalleerd. Voor de zekerheid dient er tenminste een berichten-systeem te worden geselecteerd."
