PLG_CONTENT_NOTIFYARTICLESUBMIT_NOTIFY_DESC="Galite nustatyti ar pranešti vartotojams apie pokyčius straipsnyje. Pavyzdžiui, jūs padarėte nedidelius pakeitimus ir nenorite kad vartotojai būtų trikdomi.<br /><b>PASTABA:</b>Jei pranešimas neturėtų būti siunčiamas vartotojui ar vartotojų grupei pagal nustatytas NotifyArticleSubmit įskiepio nustatymus, ši galimybė neleidžia išsiųsti. Tai gali išjungti pranešimus tik tiems, kurie turėtų gauti jį."
