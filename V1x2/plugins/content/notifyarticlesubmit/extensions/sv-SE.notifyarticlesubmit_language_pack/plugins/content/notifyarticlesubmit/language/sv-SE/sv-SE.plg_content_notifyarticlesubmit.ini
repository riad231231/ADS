PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Välj vilka inställningar som ska visas. <br /><br /> Du kan ställa in notifikationer separat för <strong>Vanliga användare</ strong> och <strong>Admin användare</strong>.<br /><br />Syftet med befintliga av de två gruppen är att dvs du kanske vill notifiera enbart vanliga användare på artiklar i vissa kategorier, men admin-användare att få alla möjliga notifikationer. Dessa grupper är främst logiska grupper, men fortfarande finns det några skillnader.<br /><br />Admin användare har högre prioritet än vanliga. Detta innebär att om en användare är satt att meddelas i både Admin och återkommande avsnitten, kommer användaren meddelas endast som administratör."
