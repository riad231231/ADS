PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Vyber které nastavení zobrazit.<br /><br />Můžeš nastavit upozornení zvlášt pro<strong>běžné užívatele</strong> a<strong>správce</strong>.<br /><br />Důvod existence dvoch skupin nastavení je ten, že např. můžete chtít upozorňovat běžné uživatele na změny jen v některých kategóriích článků zatím co správce na všechny typy změn ve všech článkoch. Tyto skupiny jsou vícemeně logické, ale jsou tu nekteré rozdíly. Správcové mají vyšší prioritu ako běžní použivatelé. To znamená, že když konkrétny uživate by měl být upozorňován i jako správce aj ako běžný uživatel, tak bude upozorňován jen jako správce."
