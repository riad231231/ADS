PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_NOTIFY_ONLY_IF_CAN_VIEW_DESC="Você pode escolher se envia notificações aos usuários, que não têm permissões para ler o artigo. Por exemplo, você vende acesso ao conteúdo e quer informar a todos os usuários sobre um novo artigo. Ou você não quer os usuários que não têm permissão  saibam sobre um novo item de conteúdo"
