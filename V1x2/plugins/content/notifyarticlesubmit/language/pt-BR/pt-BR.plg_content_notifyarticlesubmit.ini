PLG_CONTENT_NOTIFYARTICLESUBMIT_NOTIFY="Notificar?"
PLG_CONTENT_NOTIFYARTICLESUBMIT_NOTIFY_DESC="Você pode configurar para não notificar os usuários nas alterações de artigos. Por exemplo, você faz pequenas alterações e não quer que os usuários sejam incomodados por e-mail. <br /><b>NOTA:</b> Se a notificação não deve ser enviada a um usuário ou um grupo, de acordo com a configuração do plugin NotifyArticleSubmit, esta opção não permitirá enviá-la. Ela pode apenas desabilitar as notificações para quem não deve recebê-la."
