PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Escolha quais configurações exibir.<br /><br />Você pode configurar notificações separadamente para <strong>Usuários comuns</strong> e <strong>Usuários administradores</strong>.<br /><br />O motivo da existência dos dois grupos é que, por exemplo, você pode querer notificar usuários comuns apenas sobre artigos em algumas categorias, mas avisar usuários administradores sobre todas as modificações possíveis. Estes grupos são basicamente virtuais, mas ainda assim há algumas diferenças.<br /><br />Usuários administradores têm mais prioridade do que os comuns. Isto significa que, se um usuário faz parte dos dois grupos, ele será notificado apenas como um usuário administrador."
