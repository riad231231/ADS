PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Choose what settings to show.<br /><br />You can set notifications separately for <strong>Regular users</strong> and <strong>Admin users</strong>.<br /><br />The purpose of the existing of the two groups is that i.e. you may wish to notify regular users only on articles in some categories, but admin users to get all possible notifications. These groups are mainly logical groups, but still there are some differences.<br /><br />Admin users have more priority then Regular. This means, that if a user is set to be notified in both Admin and Regular sections, then the user will be notified only as Admin user."
