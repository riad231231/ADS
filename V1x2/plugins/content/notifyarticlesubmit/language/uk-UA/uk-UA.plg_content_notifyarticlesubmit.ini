PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_NOTIFICATION_SWITCH="Дозволити тимчасово вимикати сповіщення?"
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_NOTIFICATION_SWITCH_DESC="При редагуванні статті відображається умикач/вимикач сповіщення."
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_NOTIFY_ONLY_IF_CAN_VIEW="Сповіщати лише якщо може бачити"
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_NOTIFY_ONLY_IF_CAN_VIEW_DESC="Ви можете обрати, чи сповіщати користувачів, що не мають право переглядати статтю, про неї. Наприклад, ви продаєте доступ до статей і хочете проінформувати всіх користувачів про наявність нової статті. Або навпаки, ви не хочете, щоби користувачі без прав навіть знали про наявність матеріалу."
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_MAKECLONE="Кількість клонів"
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_MAKECLONE_DESC="Щоби створити клони плагіна, вкажіть потрібне число клонів і натисніть кнопку Застосувати."
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_MESSAGE_SYSTEM="Використовувати систему повідомлень"
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_MESSAGE_SYSTEM_DESC="Використовуйте CTRL+клік для вибору кількох елементів. Цей список містить всі підтримувані системи повідомлень. Якщо ви оберети систему, яку не встановлено, сповіщення не будуть працювати. Оберіть хоча б одну систему."
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_EMAIL_FORMAT="Формат email"
PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_EMAIL_FORMAT_DESC="Більшість програм перевірки пошти мають обмежену підтримку HTML. До того ж контент може використовувати CSS шаблона. Тож, формат лист у форматі HTML може  виглядати погано. Використовуйте звичайний текст, якщо хочете бути впевнені, що повідомлення читабельне."
