PLG_CONTENT_NOTIFYARTICLESUBMIT_NOTIFY_DESC="Ви можете обрати чи сповіщати користувачів про зміни у статтях. Наприклад, ви зробили граматичну правку і не хочете спамити користувачів. <br /><b>ПРИМІТКА:</b>Якщо користувач не має отримувати сповіщення згідно до налаштування плагіна NotifyArticleSubmit, то ця опція не дозволить увімкнути сповіщення для нього. Вона дозволяє лише вимикати сповіщення для тих, хто мусив би їх отримувати."
