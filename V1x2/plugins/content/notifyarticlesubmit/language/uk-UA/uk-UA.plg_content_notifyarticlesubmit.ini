PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Виберіть налаштування для перегляду. <br /> <br /> Ви можете налаштувати повідомлення окремо для <strong>звичайних користувачів</strong> та <strong>адмінстративних користувачів</strong>. <br /> <Бр /> Мета існування цих двох груп користувачів полягає в тому, що ви, можливо, забажає повідомити звичайних користувачів тільки про статті в деяких категоріях, але адміністративних користувачів про всі можливі зміни. Ці групи в основному є логічними групи, але все ж є деякі відмінності. <br /> <br />Адміністративні користувачі є більш пріоритетним, ніж звичайні. Це означає, що якщо користувач вказаний в обох групах, як адміністративний і як звичайний, то його буде повідомлений тільки як адміністративний."
