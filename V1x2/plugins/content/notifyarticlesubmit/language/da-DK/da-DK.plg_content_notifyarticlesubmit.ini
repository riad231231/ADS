PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Vis hvilke indstillinger der skal vises.<br/><br/>Du kan sætte notifikationer separat for <strong>Regulære brugere</strong> og <strong>Admin brugere</strong>.<br /><br />Grunden til at der er to grupper er fordi at du for eksempel ønsker kun at underrette regulære brugere om artikler i nogle kategorier, men admin brugere skal have alle underretninger. Disse grupper er hovedsageligt logiske grupper, men der er stadig nogle forskelle.<br /><br />Admin brugere har højere prioritet en regulære. Det betyder, at hvis en bruger er sat til at blive underrettet i både Admin og Regulær sektion, så vil brugeren kun blive underrettet som Admin."
