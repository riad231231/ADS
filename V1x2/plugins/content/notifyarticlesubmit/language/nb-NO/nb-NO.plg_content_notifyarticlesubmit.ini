PLG_CONTENT_NOTIFYARTICLESUBMIT_FIELD_SHOW_SETTINGS_DESC="Velg innstillinger som vises.<br /><br />Du kan sette varsler spesielt for  <strong>Vanlige brukeres</strong> og <strong>Administratorer</strong>.<br /><br />Hensikten med to brukergruppene er at du kan f.eks varsle vanlige brukere for bare noen artikler i noen kategorier, mens administratorer kan få alle slags varsler. Disse gruppene er hovedsaklig logiske grupper, men det er fremdeles noen forskjeller.<br /><br />Administratorer har høyere prioritet enn vanlige brukere. Dette betyr at hvis en bruker er satt opp til å bli varslet både som vanlig og administrator, så vil brukeren bare bli varslet som administrator."
