; Backend SYS file

JEM="JEM"
COM_JEM="JEM"
COM_JEM_INSTALLATION_DESCRIPTION="<p>JEM est un gestionnaire d'événement pour Joomla.</p><p>Ce n'est pas un calendrier mais une façon simple de gérer et présenter vos événements pour votre groupe, entreprise ou communauté.<br/>JEM propose de nombreuses fonctionnalités pour vous faciliter le travail comme une base de données de lieu, la récurrence d'événement, la localisation automatique, et plus encore.<br/> JEM propose également des fonctionnalités pour les visiteurs de votre site, comme un système d'enregistrement, un lien vers un service de cartographie ou la soumission d'événement et de lieu depuis le frontend...</p><p style='color:red'>Veuillez <b>ne pas utiliser cette version de développement en production</b></p><p>JEM est basé sur Eventlist par Christoph Lukes (http://www.schlu.net)</p><p>Ce paquetage contient le composant JEM accompagné des modules et plugins suivants :</p><ul><li>Search plugin</li><li>Finder plugin (smart search)</li><li>Mailer plugin</li><li>Comments plugin</li><li>Latest Events Basic module</li><li>Latest Events Wide module</li></ul><p>Si vous voulez utiliser un de ces modules ou plugin, n'oubliez  pas de les publier dans le gestionnaire de plugin / module dans l'administration de votre site.</p><p>Le support de la communauté est fourni sur <a href='http://www.joomlaeventmanager.net/forum' target='_blank'>www.joomlaeventmanager.net/forum</a>.</p>"
COM_JEM_INSTALLATION_HEADER="Par <a href='http://www.joomlaeventmanager.net' target='_blank'>joomlaeventmanager.net</a><br /> Distribué sous les termes et conditions de la <a href='http://www.gnu.org/licenses/gpl-2.0.html' target='_blank'>GNU General Public License</a>."


