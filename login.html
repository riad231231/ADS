<!DOCTYPE html>
<html lang="fr" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <title>Espace Membre - Les Ailes de Sénart</title>
    <!-- Chargement Direct Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS TOTALEMENT INTÉGRÉ */
        body { margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0F172A; color: #E2E8F0; height: 100%; display: flex; align-items: center; justify-content: center; }
        .card { background: #1E293B; width: 420px; border-radius: 16px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; text-align: center; }
        .logo { height: 50px; margin-bottom: 20px; }
        h1 { font-weight: 800; font-size: 1.8rem; margin: 0 0 10px; color: white; }
        p { color: #94A3B8; margin: 0 0 30px; font-size: 0.95rem; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748B; margin-bottom: 8px; }
        input { width: 100%; box-sizing: border-box; background: #0F172A; border: 1px solid #334155; color: white; padding: 14px; border-radius: 8px; font-size: 1rem; transition: 0.2s; }
        input:focus { border-color: #3B82F6; outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btns { margin-top: 30px; }
        button { width: 100%; padding: 14px; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s; margin-bottom: 15px; }
        .btn-blue { background: #3B82F6; color: white; }
        .btn-orange { background: #F59E0B; color: white; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 0.9rem; line-height: 1.4; border: 1px solid transparent; }
        .err { background: rgba(239, 68, 68, 0.1); color: #F87171; border-color: rgba(239, 68, 68, 0.2); }
        .suc { background: rgba(34, 197, 94, 0.1); color: #4ADE80; border-color: rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>

    <div class="card">
        <img src="resources/logo_05519.png" alt="ADS" class="logo">
        <h1 id="t-title">Connexion</h1>
        <p id="t-sub">Accédez à votre espace membre.</p>

        <!-- CHAMPS INSCRIPTION (Cachés par défaut) -->
        <div id="signup-fields" style="display: none;">
            <div class="group">
                <label>Prénom</label>
                <input type="text" id="fname" placeholder="Votre prénom">
            </div>
            <div class="group">
                <label>Nom</label>
                <input type="text" id="lname" placeholder="Votre nom de famille">
            </div>
        </div>

        <div class="group">
            <label>Votre Email</label>
            <input type="email" id="email" placeholder="votre@email.com">
        </div>

        <div class="group">
            <label>Mot de passe (Min 6 car.)</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <div class="btns">
            <button class="btn-blue" id="b-main" onclick="handleAuth()">Se Connecter</button>
            <p style="margin: 10px 0; font-size: 0.85rem; cursor: pointer; color: #3B82F6;" onclick="toggleMode()" id="t-toggle">Pas encore de compte ? S'inscrire</p>
        </div>

        <div id="msg"></div>

        <a href="index.html" style="color: #64748B; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 20px;">← Retour à l'accueil</a>
    </div>

    <script>
        // Initialisation de secours
        let client;

        window.onload = function() {
            const SU_URL = "https://hksbiafznhdjngzimypi.supabase.co";
            const SU_KEY = "sb_publishable_odIBMR0BBSPQiJrcyma9NQ_sumPmxew";
            
            try {
                if (window.supabase) {
                    client = window.supabase.createClient(SU_URL, SU_KEY);
                }
            } catch (err) {
                console.error("Init error", err);
            }
        };

        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').style.display = isSignup ? 'block' : 'none';
            document.getElementById('t-title').innerText = isSignup ? 'Inscription' : 'Connexion';
            document.getElementById('t-sub').innerText = isSignup ? 'Demandez votre accès au club.' : 'Accédez à votre espace membre.';
            document.getElementById('b-main').innerText = isSignup ? 'Créer mon compte' : 'Se Connecter';
            document.getElementById('b-main').className = isSignup ? 'btn-orange' : 'btn-blue';
            document.getElementById('t-toggle').innerText = isSignup ? 'Déjà inscrit ? Se connecter' : "Pas encore de compte ? S'inscrire";
        }

        async function handleAuth() {
            const em = document.getElementById('email').value.trim();
            const pw = document.getElementById('pass').value;
            const fn = document.getElementById('fname').value.trim();
            const ln = document.getElementById('lname').value.trim();
            const ms = document.getElementById('msg');
            const btn = document.getElementById('b-main');

            if (!client) return; 
            if (!em || !pw) return;
            if (isSignup && (!fn || !ln)) return;
            if (pw.length < 6) { ms.style.display='block'; ms.className='err'; ms.innerText='Mot de passe trop court (min 6).'; return; }

            btn.disabled = true;
            ms.style.display = 'block'; 
            ms.className = "";
            ms.innerText = "Chargement...";

            try {
                if (!isSignup) {
                    const { data, error } = await client.auth.signInWithPassword({ email: em, password: pw });
                    if (error) throw error;
                    
                    const { data: prof } = await client.from('profiles').select('*').eq('id', data.user.id).single();
                    if (!prof || !prof.is_approved) {
                        ms.className = "err";
                        ms.innerHTML = "<strong>Accès en attente</strong><br>Le bureau ADS doit valider votre compte.";
                        await client.auth.signOut();
                        btn.disabled = false;
                        return;
                    }
                    window.location.href = 'admin/index.html';
                } else {
                    const { data, error } = await client.auth.signUp({ email: em, password: pw });
                    if (error) throw error;
                    
                    await client.from('profiles').insert([{ 
                        id: data.user.id, 
                        username: fn, 
                        full_name: fn + " " + ln,
                        is_approved: false 
                    }]);
                    
                    ms.className = "suc";
                    ms.innerHTML = "<strong>Demande enregistrée !</strong><br>Le bureau va valider votre compte très prochainement.";
                }
            } catch (err) {
                ms.className = "err";
                ms.innerText = "Erreur : " + err.message;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
